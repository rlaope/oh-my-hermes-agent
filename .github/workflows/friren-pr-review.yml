name: Friren PR Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: friren-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Post Friren review comment
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.state == 'open' }}
    steps:
      - name: Check out trusted base workflow code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Post or update PR review comment
        env:
          RLAOPE_REVIEW_TOKEN: ${{ secrets.RLAOPE_REVIEW_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python .github/scripts/friren_pr_review.py
